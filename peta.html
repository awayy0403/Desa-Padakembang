<script>
    // Inisialisasi EmailJS dengan User ID Anda
    emailjs.init("XivPtIBtdZxbjPkkX");

    function sendEmail(event) {
        event.preventDefault();

        const form = event.target;
        const nama = form.elements.nama.value;
        const email = form.elements.email.value;
        const pesan = form.elements.pesan.value;

        // Ganti template_id dengan ID template email Anda dari EmailJS
        emailjs.send("service_s4jscal", "template_1h6eaz6", {
            to_name: nama,
            from_name: email,
            message: pesan,
        }).then(
            function(response) {
                console.log("Email terkirim:", response);
                alert("Pesan telah terkirim.");
            },
            function(error) {
                console.log("Gagal mengirim email:", error);
                alert("Maaf, terjadi kesalahan saat mengirim pesan.");
            }
        );

        form.reset();
        return false;
    }
</script>
